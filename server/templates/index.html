<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CS-Scout 2.0</title>
<style>
 body{margin:0;font-family:system-ui;background:#0f0f1a;color:#eee}
 header{height:50px;display:flex;align-items:center;padding:0 16px;
   background:#16162a;border-bottom:1px solid #2a2a44;font-weight:600}
 .wrap{display:flex;height:calc(100vh - 50px)}
 .side{width:240px;padding:12px;border-right:1px solid #2a2a44;overflow:auto}
 .main{flex:1;padding:12px;overflow:auto}
 input,select{width:100%;margin:4px 0;padding:6px;background:#1e1e36;
   color:#eee;border:1px solid #333;border-radius:4px;box-sizing:border-box}
 button{width:100%;padding:8px;margin-top:8px;background:#3a6df0;color:#fff;
   border:0;border-radius:4px;cursor:pointer}
 .card{background:#16162a;border:1px solid #2a2a44;border-radius:8px;
   padding:12px;margin-bottom:16px}
 .tabs button{width:auto;display:inline-block;margin-right:6px;background:#26264a}
 .tabs button.active{background:#3a6df0}
 .grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
 .cell{flex:1;min-width:260px}
 .cell h4{margin:4px 0;font-size:13px;color:#9ad}
 canvas{width:100%;background:#1a1a2e;border-radius:4px}
 .stat{display:inline-block;margin-right:16px;font-size:14px}
 #failed{color:#ff6b6b;font-size:13px;margin-top:12px}
 .ctrls{margin-left:auto;display:flex;align-items:center;gap:10px;font-weight:400;font-size:13px}
 .ctrls button{width:34px;padding:4px 0;margin:0;background:#26264a;font-size:14px}
 .ctrls input[type=range]{width:260px;margin:0}
 .ctrls #timelbl{color:#9ad;font-family:monospace;min-width:96px;text-align:right}
 .sidetoggle button{width:46px;background:#26264a}
 .sidetoggle button.active{background:#3a6df0}
 .section-title{margin:4px 0 8px;font-size:14px;color:#9ad;font-weight:600}
 #pistol{background:#16162a;border:1px solid #2a2a44;border-radius:8px;padding:12px;margin-bottom:16px}
 #pistol canvas{max-width:520px}
 .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:13px}
 .legend span{display:inline-flex;align-items:center;gap:6px}
 .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
 .card .grid canvas{max-width:520px}
</style></head><body>
<header>CS-Scout 2.0 — 对手回放分析
 <span class="ctrls">
  <span class="sidetoggle" title="统一切换 CT / T">
   <button id="sideCT" data-s="CT" class="active">CT</button><button id="sideT" data-s="T">T</button>
  </span>
  <button id="playpause" title="播放/暂停">⏸</button>
  <input id="scrub" type="range" min="0" max="1000" value="0" title="进度（可拖动跳转）">
  <span id="timelbl">0.0 / 20.0s</span>
 </span>
</header>
<div class="wrap">
 <div class="side">
  <select id="map"></select>
  <input id="u0" placeholder="对手用户名 1">
  <input id="u1" placeholder="对手用户名 2">
  <input id="u2" placeholder="对手用户名 3">
  <input id="u3" placeholder="对手用户名 4">
  <input id="u4" placeholder="对手用户名 5">
  <input id="depth" type="number" min="1" max="10" value="6" title="每人 demo 数">
  <input id="key" placeholder="访问密钥" type="password">
  <button id="run">开始扫描</button>
  <div id="status"></div>
  <div id="failed"></div>
 </div>
 <div class="main">
  <div id="pistol" style="display:none">
   <div class="section-title">手枪局 · 全队合并</div>
   <canvas id="pistolCanvas"></canvas>
   <div class="legend" id="pistolLegend"></div>
  </div>
  <div id="cards"></div>
 </div>
</div>
<script src="/static/replay.js"></script>
<script src="/static/app.js"></script>
</body></html>
