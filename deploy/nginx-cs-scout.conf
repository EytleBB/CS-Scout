# Production reverse proxy for CS-Scout.
# Replace every scout.example.com value before installing this file.

limit_req_zone $binary_remote_addr zone=cs_scout_analyze:10m rate=5r/m;

upstream cs_scout_backend {
    server 127.0.0.1:5000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name scout.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Match Ubuntu/Certbot's existing shared 443 socket options. Mixing the
    # legacy `listen ... http2` flag with another virtual host that omits it
    # makes nginx 1.24 warn that protocol options were redefined.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name scout.example.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/scout.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scout.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:CS_SCOUT_TLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 16k;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    location = /api/analyze {
        limit_req zone=cs_scout_analyze burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://cs_scout_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://cs_scout_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 30s;
    }
}
