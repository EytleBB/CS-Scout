# Temporary HTTP-only virtual host used to obtain the first TLS certificate.
# Replace scout.example.com before installing this file.
server {
    listen 80;
    listen [::]:80;
    server_name scout.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 503;
    }
}
