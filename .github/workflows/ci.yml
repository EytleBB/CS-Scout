name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement server/requirements-dev.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Verify private integration fixture is absent
        run: >-
          python -c "from pathlib import Path;
          assert not Path('demos_analysis/g161-n-20260123174821830606429_de_mirage.dem').exists(),
          'private 328 MB integration fixture must not run in CI'"

      - name: Run offline test suite
        env:
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
          ALL_PROXY: http://127.0.0.1:9
          NO_PROXY: localhost,127.0.0.1
        run: python -m pytest server/tests --basetemp=.pytest-tmp -v
